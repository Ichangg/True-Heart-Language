<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đăng nhập – English Center</title>
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
  <div class="auth-wrapper">
    <div class="auth-card">
      <div class="logo-icon">E</div>
      <h2>Chào mừng trở lại</h2>
      <p>Đăng nhập vào tài khoản của bạn</p>

      <form id="loginForm" class="auth-form">
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="loginEmail" class="form-control" placeholder="Nhập email" required>
        </div>
        <div class="form-group">
          <div style="display:flex; justify-content:space-between;">
            <label>Mật khẩu</label>
            <a href="#" style="font-size:12px; color:var(--accent); text-decoration:none;">Quên mật khẩu?</a>
          </div>
          <input type="password" id="loginPassword" class="form-control" placeholder="Nhập mật khẩu" required>
        </div>
        <button type="submit" class="btn btn-primary" id="loginBtn">Đăng nhập</button>
      </form>

      <div class="auth-links">
        Chưa có tài khoản? <a href="register.html">Đăng ký ngay</a>
      </div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script type="module" src="assets/js/auth.js"></script>
</body>
</html>
