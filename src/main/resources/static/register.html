<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register – English Center</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body>
  <nav class="navbar">
    <div class="logo">English Center</div>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="login.html">Login</a></li>
    </ul>
  </nav>

  <section class="login-section" style="display:flex;justify-content:center;align-items:center;min-height:85vh;padding:2rem;">
    <form id="registerForm" class="card-glass animate-fade-in" style="width:100%; max-width: 500px;">
      <h2 style="margin-bottom:1.5rem;color:#fff;text-align:center;font-size:1.8rem;">Create an Account</h2>
      
      <!-- Role Selection -->
      <div style="margin-bottom:1.5rem;">
        <label style="color:#e0e0e0;display:block;margin-bottom:0.8rem;font-weight:500;">I am a:</label>
        <div class="role-selector">
          <input type="radio" id="roleStudent" name="role" value="STUDENT" checked>
          <label for="roleStudent">Student</label>
          
          <input type="radio" id="roleTeacher" name="role" value="TEACHER">
          <label for="roleTeacher">Teacher</label>
          
          <input type="radio" id="roleAdmin" name="role" value="ADMIN">
          <label for="roleAdmin">Admin</label>
        </div>
      </div>

      <div style="margin-bottom:1.2rem;">
        <label for="username" style="color:#e0e0e0;display:block;margin-bottom:0.5rem;font-weight:500;">Username</label>
        <input type="text" id="username" name="username" required style="width:100%;padding:0.75rem;border:1px solid rgba(255,255,255,0.2);border-radius:8px;background:rgba(0,0,0,0.2);color:#fff;outline:none;">
      </div>
      
      <div style="margin-bottom:1.2rem;">
        <label for="email" style="color:#e0e0e0;display:block;margin-bottom:0.5rem;font-weight:500;">Email</label>
        <input type="email" id="email" name="email" required style="width:100%;padding:0.75rem;border:1px solid rgba(255,255,255,0.2);border-radius:8px;background:rgba(0,0,0,0.2);color:#fff;outline:none;">
      </div>

      <div style="margin-bottom:1.2rem;">
        <label for="password" style="color:#e0e0e0;display:block;margin-bottom:0.5rem;font-weight:500;">Password</label>
        <input type="password" id="password" name="password" required style="width:100%;padding:0.75rem;border:1px solid rgba(255,255,255,0.2);border-radius:8px;background:rgba(0,0,0,0.2);color:#fff;outline:none;">
      </div>

      <div style="margin-bottom:1.5rem;">
        <label for="confirmPassword" style="color:#e0e0e0;display:block;margin-bottom:0.5rem;font-weight:500;">Confirm Password</label>
        <input type="password" id="confirmPassword" name="confirmPassword" required style="width:100%;padding:0.75rem;border:1px solid rgba(255,255,255,0.2);border-radius:8px;background:rgba(0,0,0,0.2);color:#fff;outline:none;">
      </div>

      <button type="submit" class="cta-btn" style="width:100%;font-size:1.1rem;padding:0.8rem;">Register</button>
      
      <div class="auth-link">
        Already have an account? <a href="login.html">Login here</a>
      </div>
    </form>
  </section>

  <footer class="footer" style="position:relative;margin-top:2rem;">
    <p>&copy; 2024 English Center. All rights reserved.</p>
  </footer>

  <script src="assets/js/api.js"></script>
  <script src="assets/js/ui.js"></script>
  <script>
    document.getElementById('registerForm').addEventListener('submit', function(e) {
      e.preventDefault();
      // Basic placeholder for registration logic
      const role = document.querySelector('input[name="role"]:checked').value;
      const username = document.getElementById('username').value;
      const email = document.getElementById('email').value;
      alert(`Registration submitted for ${username} as ${role}.\nWait for API integration.`);
      // window.location.href = 'login.html';
    });
  </script>
</body>
</html>
