<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đăng ký – English Center</title>
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
  <div class="auth-wrapper">
    <div class="auth-card">
      <div class="logo-icon">E</div>
      <h2>Tạo tài khoản</h2>
      <p>Chọn vai trò của bạn để bắt đầu sử dụng hệ thống</p>
      
      <div class="role-tabs">
        <div class="role-tab active" data-role="student">Học sinh</div>
        <div class="role-tab" data-role="parent">Phụ huynh</div>
      </div>

      <form id="registerForm" class="auth-form">
        <div class="form-group">
          <label>Họ và tên</label>
          <input type="text" id="regName" class="form-control" placeholder="Nhập họ tên của bạn" required>
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="regEmail" class="form-control" placeholder="Nhập email" required>
        </div>
        <div class="form-group">
          <label>Mật khẩu</label>
          <input type="password" id="regPassword" class="form-control" placeholder="Nhập mật khẩu" required>
        </div>
        <div class="form-group">
          <label>Số điện thoại</label>
          <input type="tel" id="regPhone" class="form-control" placeholder="Nhập số điện thoại" required>
        </div>
        <button type="submit" id="registerBtn" class="btn btn-primary">Tạo tài khoản</button>
      </form>

      <div class="auth-links">
        Đã có tài khoản? <a href="login.html">Đăng nhập ngay</a>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script type="module" src="assets/js/auth.js"></script>
</body>
</html>
